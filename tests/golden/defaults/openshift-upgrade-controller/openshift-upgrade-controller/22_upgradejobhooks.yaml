apiVersion: managedupgrade.appuio.io/v1beta1
kind: UpgradeJobHook
metadata:
  labels:
    name: mitigate
  name: mitigate
  namespace: appuio-openshift-upgrade-controller
spec:
  events:
    - Start
  selector:
    matchLabels:
      upgradeconfig/name: appuio-monday-afternoon
  template:
    spec:
      activeDeadlineSeconds: 900
      template:
        metadata:
          annotations:
            openshift.io/required-scc: restricted-v2
        spec:
          containers:
            - args:
                - check
              image: quay.io/appuio/upgrade-mitigate:latest
              name: mitigate
          priorityClassName: system-cluster-critical
          restartPolicy: Never
          serviceAccountName: hook-manager
---
apiVersion: managedupgrade.appuio.io/v1beta1
kind: UpgradeJobHook
metadata:
  labels:
    name: notify
  name: notify
  namespace: appuio-openshift-upgrade-controller
spec:
  events:
    - Create
    - Start
    - UpgradeComplete
    - Finish
    - Success
    - Failure
  failurePolicy: Ignore
  run: Next
  selector:
    matchLabels:
      upgradeconfig/name: appuio-monday-afternoon
  template:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 3
      template:
        metadata:
          annotations:
            openshift.io/required-scc: restricted-v2
        spec:
          containers:
            - args:
                - -XPOST
                - -H
                - 'Content-Type: application/json'
                - -d
                - '{"event": $(EVENT_NAME), "version": $(JOB_spec_desiredVersion_image)}'
                - https://example.com/webhook
              image: curlimages/curl:8.1.2
              name: notify
          priorityClassName: system-cluster-critical
          restartPolicy: Never
          serviceAccountName: hook-manager
      ttlSecondsAfterFinished: 43200
